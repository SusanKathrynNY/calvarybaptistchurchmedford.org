<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Clockwise path starting at left (9 o'clock) — text is right-side-up at top -->
    <path id="borderText" d="M 19,100 A 81,81 0 0,1 100,19 A 81,81 0 0,1 181,100 A 81,81 0 0,1 100,181 A 81,81 0 0,1 19,100"/>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="99" fill="#8B1818"/>

  <!-- Inner border ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="0.75" opacity="0.4"/>

  <!-- Cross -->
  <rect x="95" y="16" width="10" height="44" fill="white" rx="1"/>
  <rect x="79" y="27" width="42" height="10" fill="white" rx="1"/>

  <!-- CALVARY BAPTIST CHURCH text -->
  <text x="100" y="81" text-anchor="middle" fill="white" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" letter-spacing="1">CALVARY</text>
  <text x="100" y="101" text-anchor="middle" fill="white" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" letter-spacing="1">BAPTIST</text>
  <text x="100" y="121" text-anchor="middle" fill="white" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" letter-spacing="1">CHURCH</text>

  <!-- OF MEDFORD, NY -->
  <text x="100" y="135" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" letter-spacing="1.5">OF MEDFORD, NY</text>

  <!-- Open Bible icon -->
  <g transform="translate(100,163)">
    <path d="M -22,-11 L 0,-8 L 0,11 L -22,8 Z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 22,-11 L 0,-8 L 0,11 L 22,8 Z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M -22,8 Q 0,15 22,8" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="-17" y1="-4" x2="-3" y2="-3" stroke="white" stroke-width="1"/>
    <line x1="-17" y1="0" x2="-3" y2="1" stroke="white" stroke-width="1"/>
    <line x1="-17" y1="4" x2="-3" y2="5" stroke="white" stroke-width="1"/>
    <line x1="3" y1="-3" x2="17" y2="-4" stroke="white" stroke-width="1"/>
    <line x1="3" y1="1" x2="17" y2="0" stroke="white" stroke-width="1"/>
    <line x1="3" y1="5" x2="17" y2="4" stroke="white" stroke-width="1"/>
  </g>

  <!-- Circular border text -->
  <text font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold" letter-spacing="3.2">
    <textPath href="#borderText" startOffset="88%">TO KNOW CHRIST · BE CONFORMED TO HIS IMAGE · MAKE HIM KNOWN ·</textPath>
  </text>
</svg>
